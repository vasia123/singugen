# SinguGen configuration
# Environment variables can be used: ${VAR_NAME}
# Env var overrides: SINGUGEN_TELEGRAM_TOKEN, SINGUGEN_LOG_LEVEL, SINGUGEN_LOG_FORMAT

telegram:
  token: "${SINGUGEN_TELEGRAM_TOKEN}"
  allow_from: []  # empty = allow all, or list of Telegram user IDs

supervisor:
  healthcheck_interval: 10s
  max_restarts: 5
  restart_window: 2m
  child_binary: "/usr/local/bin/singugen-agent"

agent:
  workspace_path: "data/workspace"
  data_path: "data"
  claude_binary: "claude"           # path to claude CLI binary
  claude_model: ""                  # empty = use default model
  claude_timeout: 3m                # watchdog timeout per interaction
  claude_max_retries: 10            # auto-restart attempts on crash
  queue_size: 64                    # max pending messages
  memory_path: "data/memory"       # per-agent markdown memory files
  idle_timeout: 15m                # dreaming triggers after this idle time
  dream_on_shutdown: true          # force dreaming before shutdown
  max_dream_duration: 5m           # max time for a single dream cycle

agents:
  base_dir: "data/agents"           # base directory for agent workspaces
  default_agent: "main"             # default routing target
  definitions:
    main:
      description: "Primary AI agent"
      model: ""                     # empty = use agent.claude_model
      enabled: true
    # researcher:
    #   description: "Web research specialist"
    #   enabled: false              # spawn on-demand via /hire

self_update:
  enabled: false                   # enable /update command
  auto_push: false                 # push after commit
  push_branch: "self-update"       # branch name for push
  build_timeout: 2m                # timeout for go build
  test_timeout: 2m                 # timeout for go test
  protected_dirs:                  # directories agent cannot modify
    - "cmd/singugen"
    - "internal/supervisor"

log:
  level: "info"    # debug, info, warn, error
  format: "text"   # text, json
